services:
  postgres:
    image: postgres:16-alpine
    container_name: salonapp_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: salonapp
      POSTGRES_USER: salonapp
      POSTGRES_PASSWORD: salonapp_secret
    volumes:
      - salonapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salonapp -d salonapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: salonapp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - salonapp_redis:/data

volumes:
  salonapp_pgdata:
  salonapp_redis:
